<VirtualHost *:80>
        ServerName dyme
        ServerAdmin webmaster@localhost
        DocumentRoot /dyme_base/frontend

        #DYME API
        WSGIDaemonProcess api user=www-data group=www-data threads=8
        WSGIScriptAlias /api /dyme_base/backend/dyme/api/dyme_api.wsgi
        #WSGISocketPrefix /tmp/wsgi

        #DYME App website frontend
        <Directory /dyme_base/frontend>
          Allow from all
          Options FollowSymLinks Indexes MultiViews
          Require all granted
          DirectoryIndex index index.php
        </Directory>
 
        #DYME API Directory
        <Directory /dyme_base/backend/dyme/api>
          WSGIProcessGroup api
          WSGIApplicationGroup %{GLOBAL}
          Allow from all
          Options FollowSymLinks
          Require all granted
        </Directory>

        ErrorLog /dyme_root/logs/error.log
        LogLevel warn
        CustomLog /dyme_root/logs/access.log combined
</VirtualHost>
