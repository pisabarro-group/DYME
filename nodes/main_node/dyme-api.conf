<VirtualHost *:80>
    ServerName dyme
    ServerAdmin webmaster@localhost
    DocumentRoot /dyme_base/frontend

    # DYME API
    WSGIDaemonProcess api user=www-data group=www-data threads=8 python-home=/dyme_env/anaconda/envs/dyme_main python-path=/dyme_base/backend/dyme/api:/dyme_base/backend/dyme
    WSGIScriptAlias /api /dyme_base/backend/dyme/api/dyme_api.wsgi

    # DYME App website frontend
    <Directory /dyme_base/frontend>
        Options FollowSymLinks Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex index.php index

        RewriteEngine On

        # serve existing files/directories normally
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        # /index -> /index.php
        RewriteRule ^index$ /index.php [QSA,L]

        # optional: send everything else to index.php too
        # RewriteRule ^.*$ /index.php [QSA,L]
    </Directory>

    # DYME API Directory
    <Directory /dyme_base/backend/dyme/api>
        WSGIProcessGroup api
        WSGIApplicationGroup %{GLOBAL}
        Options FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog /dyme_root/logs/dymeweb_error.log
    LogLevel warn
    CustomLog /dyme_root/logs/dymeweb_access.log combined
</VirtualHost>
